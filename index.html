<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#8cbcbc;--teal-dark:#6aa4a4;--teal-light:#d4ecec;--teal-xlight:#eef7f7;
  --blush:#ebbdbb;--blush-dark:#c9908e;--blush-light:#f7e8e7;--blush-xlight:#fdf4f4;
  --bg:#ffffff;--bg2:#f8f6f4;--bg3:#f2eeec;
  --text:#2c2c2a;--text2:#666;--text3:#aaa;
  --border:#e0dbd8;--border2:#ccc;
  --green:#5aa08a;--green-dark:#3d7a65;
  --radius:8px;--radius-lg:14px;
  --topbar:52px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1c;--bg2:#262624;--bg3:#2e2c2a;
    --text:#f0ede8;--text2:#aaa;--text3:#666;
    --border:#3a3836;--border2:#555;
    --teal-light:#1a3535;--teal-xlight:#0f2525;
    --blush-light:#2e1e1e;--blush-xlight:#1e1414;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--teal);padding:0 16px;height:var(--topbar);display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-logo{font-size:15px;font-weight:700;color:#fff;flex:1}
.topbar-logo span{opacity:.75;font-weight:400;font-size:13px}
.hamburger{background:none;border:none;cursor:pointer;color:#fff;font-size:24px;padding:4px;display:none;line-height:1}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease}
.sidebar-header{padding:14px 12px 8px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.sidebar-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.prop-list{flex:1;overflow-y:auto;padding:6px}
.prop-item{padding:10px 11px;border-radius:var(--radius);cursor:pointer;margin-bottom:3px;border:0.5px solid transparent}
.prop-item:hover{background:var(--bg2)}
.prop-item.active{background:var(--teal-xlight);border-color:var(--teal)}
.prop-item.active .prop-name{color:var(--teal-dark)}
.prop-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-meta{font-size:11px;color:var(--text3);margin-top:2px}
.prop-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-top:4px;font-weight:600}
.badge-seller,.badge-dual,.badge-cash,.badge-financed{background:var(--teal-light);color:var(--teal-dark)}
.badge-buyer{background:var(--blush-light);color:var(--blush-dark)}
.badge-closed{background:var(--bg2);color:var(--text2);border:0.5px solid var(--border)}
.badge-archived{background:var(--bg3);color:var(--text3)}
.sidebar-footer{padding:10px;border-top:0.5px solid var(--border);flex-shrink:0}
.section-label{font-size:10px;color:var(--text3);padding:10px 4px 3px;text-transform:uppercase;letter-spacing:.05em}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--text);font-family:inherit;font-weight:600;white-space:nowrap;transition:all .12s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--teal);border-color:var(--teal-dark);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}
.btn-success{background:var(--green);border-color:var(--green-dark);color:#fff}
.btn-success:hover{background:var(--green-dark)}
.btn-danger{color:#a32d2d;border-color:#f7c1c1}
.btn-danger:hover{background:#fcebeb}
.btn-warn{background:#faeeda;border-color:#fac775;color:#633806}
.btn-warn:hover{background:#f5e0b8}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-block{width:100%;justify-content:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{padding:12px 16px 0;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.prop-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.main-title{font-size:17px;font-weight:700;color:var(--text)}
.main-subtitle{font-size:12px;color:var(--text3);margin-bottom:6px}
.action-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.stat-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.stat-pill{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--bg2);border:0.5px solid var(--border);color:var(--text2)}
.stat-pill span{font-weight:700;color:var(--teal-dark)}
.tab-bar{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:var(--radius)}
.tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);border:none;background:transparent;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .12s}
.tab.active{background:var(--bg);color:var(--teal-dark);border:0.5px solid var(--teal)}
.progress-wrap{padding:6px 16px 4px;flex-shrink:0;background:var(--bg);border-bottom:0.5px solid var(--border)}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s}
.progress-label{font-size:11px;color:var(--text3);text-align:right;padding-top:2px;padding-bottom:2px}
.content{flex:1;overflow-y:auto;padding:14px}

/* Dates panel */
.dates-panel{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:14px;overflow:hidden}
.dates-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--teal-xlight);border-bottom:0.5px solid var(--teal-light);cursor:pointer;user-select:none}
.dates-header-title{font-size:13px;font-weight:700;color:var(--teal-dark);flex:1}
.dates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0;overflow:hidden}
.date-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);min-width:0;overflow:hidden}
.date-item:last-child{border-bottom:none}
.date-icon{width:32px;height:32px;border-radius:8px;background:var(--teal-xlight);display:flex;align-items:center;justify-content:center;color:var(--teal-dark);font-size:15px;flex-shrink:0}
.date-icon.blush{background:var(--blush-xlight);color:var(--blush-dark)}
.date-icon.green{background:#eaf7f0;color:var(--green-dark)}
.date-icon.warn{background:#faeeda;color:#633806}
.date-body{flex:1;min-width:0}
.date-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.date-val{font-size:13px;font-weight:600;color:var(--text);margin-top:1px}
.date-val.empty{color:var(--text3);font-weight:400;font-style:italic}
.date-edit-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px}
.date-edit-btn:hover{color:var(--teal-dark);background:var(--teal-xlight)}
.add-date-row{padding:8px 14px;border-top:0.5px solid var(--border)}

/* Phase */
.phase-section{margin-bottom:10px}
.phase-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--blush-light);border-radius:var(--radius);cursor:pointer;border:0.5px solid var(--blush);margin-bottom:5px;user-select:none}
.phase-header:hover{background:var(--blush-xlight)}
.phase-title{font-size:13px;font-weight:700;flex:1;color:var(--blush-dark)}
.phase-count{font-size:11px;color:var(--blush-dark);opacity:.7;font-weight:600}
.phase-toggle{color:var(--blush-dark);font-size:16px;transition:transform .2s;opacity:.7}
.phase-toggle.open{transform:rotate(180deg)}
.phase-add-btn{font-size:11px;padding:2px 8px;border-radius:8px;background:var(--blush-xlight);border:0.5px solid var(--blush);color:var(--blush-dark);cursor:pointer;font-weight:600;font-family:inherit}
.task-list{display:flex;flex-direction:column;gap:4px}
.task-item{display:flex;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);align-items:flex-start}
.task-item:hover{border-color:var(--teal)}
.task-item.done{opacity:.5}
.task-item.done .task-name{text-decoration:line-through}
.task-check{width:18px;height:18px;min-width:18px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:transparent;transition:all .15s}
.task-check:hover{border-color:var(--teal)}
.task-check.checked{background:var(--teal);border-color:var(--teal-dark)}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:600;line-height:1.4}
.task-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.task-meta{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;align-items:center}
.meta-tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:10px;border:0.5px solid var(--border);font-weight:500;cursor:pointer;user-select:none;transition:opacity .12s}
.meta-tag:hover{opacity:.75}
.meta-tc{background:var(--teal-xlight);color:var(--teal-dark);border-color:var(--teal)}
.meta-agent{background:var(--blush-xlight);color:var(--blush-dark);border-color:var(--blush)}
.meta-both{background:var(--bg2);color:var(--text2);border-color:var(--border2)}
.meta-dotloop{background:#f0f7e8;color:#3a6b1a;border-color:#b8d98a}
.meta-off{opacity:.35;text-decoration:line-through}
.email-btn{font-size:11px;padding:3px 10px;border-radius:10px;border:0.5px solid var(--teal);color:var(--teal-dark);background:var(--teal-xlight);cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:inherit;font-weight:600}
.email-btn:hover{background:var(--teal-light)}
.email-btn.off{border-color:var(--border);color:var(--text3);background:var(--bg2);text-decoration:line-through;opacity:.4}
.task-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px;border-radius:4px;line-height:1;flex-shrink:0}
.task-del-btn:hover{color:#a32d2d;background:#fcebeb}

/* Onesheet */
.onesheet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.onesheet-phase{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden}
.onesheet-ph-title{padding:9px 13px;font-size:11px;font-weight:700;background:var(--blush-light);border-bottom:0.5px solid var(--blush);color:var(--blush-dark);text-transform:uppercase;letter-spacing:.05em}
.onesheet-item{display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:0.5px solid var(--border)}
.onesheet-item:last-child{border-bottom:none}
.onesheet-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--teal);flex-shrink:0}
.onesheet-label{font-size:12px;flex:1;line-height:1.4}
.onesheet-label.done{text-decoration:line-through;color:var(--text3)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);width:100%;max-width:560px;max-height:92dvh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-header{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--teal-xlight)}
.modal-icon{width:30px;height:30px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
.modal-icon.blush{background:var(--blush)}
.modal-icon.red{background:#a32d2d}
.modal-icon.green{background:var(--green)}
.modal-title{font-size:14px;font-weight:700;flex:1}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--bg2)}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
.form-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.form-input{font-size:13px;padding:8px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);width:100%;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--teal)}
textarea.form-input{min-height:80px;resize:vertical}
.email-field{margin-bottom:12px}
.email-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.email-val{font-size:13px;padding:7px 10px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);color:var(--text)}
.email-body-area{font-size:13px;padding:10px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);min-height:200px;white-space:pre-wrap;font-family:inherit;line-height:1.6;outline:none;color:var(--text);width:100%}
.email-body-area:focus{border-color:var(--teal)}
.toggle-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.toggle-chip{padding:5px 12px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg2);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);font-family:inherit;transition:all .12s}
.toggle-chip.on{background:var(--teal);border-color:var(--teal-dark);color:#fff}
.confirm-msg{font-size:13px;color:var(--text2);line-height:1.7}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;color:var(--text3);text-align:center}
.empty-icon{width:60px;height:60px;border-radius:18px;background:var(--teal-xlight);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;color:var(--teal)}
.empty-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px;margin-bottom:20px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}

/* Dashboard */
.dash-header{display:flex;align-items:center;gap:16px;padding:20px 20px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.dash-header-left{flex:1;min-width:0}
.dash-greeting{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.dash-stats-row{display:flex;gap:16px}
.dash-stat{font-size:12px;color:var(--text2)}
.dash-stat span{font-weight:700;font-size:15px;color:var(--teal-dark);display:block}
.dash-content{flex:1;overflow-y:auto;padding:16px 20px}
.dash-section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px}
.dash-section-label:first-child{margin-top:0}
.dash-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:8px}
.prop-tile{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:16px;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prop-tile:hover{border-color:var(--teal);box-shadow:0 4px 16px rgba(140,188,188,.2);transform:translateY(-1px)}
.tile-top{display:flex;gap:14px;align-items:center}
.tile-progress{flex-shrink:0}
.tile-info{flex:1;min-width:0}
.tile-address{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px}
.tile-client{font-size:12px;color:var(--text2);margin-top:2px}
.tile-closing{font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:4px}
.tile-closing.urgent{color:#c0392b;background:#fcebeb;padding:3px 8px;border-radius:8px;font-weight:600}
.dash-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;padding:40px}
.dash-empty-icon{width:72px;height:72px;border-radius:20px;background:var(--teal-xlight);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:34px;color:var(--teal)}
.dash-empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.dash-empty-sub{font-size:14px;color:var(--text2);margin-bottom:20px}
@media(max-width:700px){
  .dash-tiles{grid-template-columns:1fr}
  .dash-header{padding:14px}
}

/* PWA icon canvas (hidden) */
#pwa-icon-canvas{display:none}

@media(max-width:700px){
  .sidebar{position:fixed;top:var(--topbar);left:0;bottom:0;z-index:50;transform:translateX(-100%);width:270px;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop.open{display:block}
  .hamburger{display:flex}
  .action-row{gap:5px}
  .tab-bar{overflow-x:auto}
  .dates-grid{grid-template-columns:1fr 1fr !important}
  .date-label{font-size:10px}
  .date-val{font-size:12px}
  .date-icon{width:26px;height:26px;font-size:13px}
  .dates-panel{overflow:hidden}
  .main-header{padding:10px 12px 0}
  .content{padding:10px}
}
@media(max-width:400px){
  .dates-grid{grid-template-columns:1fr !important}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>

function setSyncStatus(msg,ok){
  const el=document.getElementById('sync-status');
  if(!el)return;

async function save(){
  if(!props.length)return;
  const data=JSON.stringify(props);
  try{localStorage.setItem(STORAGE_KEY,data);}catch(e){}
  setSyncStatus('Saving...', true);
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/properties',{
      method:'POST',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal'
      },
      body:JSON.stringify({id:DB_ID,data:data,updated_at:new Date().toISOString()})
    });
    if(!res.ok){
      const t=await res.text();
      console.warn('Save error:',res.status,t);
      setSyncStatus('Save failed: '+res.status, false);
    } else {
      setSyncStatus('Synced ✓', true);
      setTimeout(()=>setSyncStatus('',true),3000);
    }
  }catch(e){
    console.warn('Save failed',e);
    setSyncStatus('Offline', false);
  }
}

async function load(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/properties?id=eq.'+DB_ID+'&select=data',{
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY
      }
    });
    if(res.ok){
      const rows=await res.json();
      if(rows&&rows.length>0&&rows[0].data){
        let parsed=rows[0].data;
        if(typeof parsed==='string')parsed=JSON.parse(parsed);
        if(Array.isArray(parsed)&&parsed.length>0){
          props=parsed;
          console.log('Loaded from cloud:',parsed.length,'props');
          return;
        }
      }
    }else{
      const t=await res.text();
      console.warn('Load error:',res.status,t);
    }
  }catch(e){console.warn('Load failed',e);}
  try{
    const d=localStorage.getItem(STORAGE_KEY);
    if(d){const p=JSON.parse(d);if(Array.isArray(p)&&p.length>0){props=p;console.log('Loaded from localStorage');}}
  }catch(e){props=[];}
}

function deepClone(o){return JSON.parse(JSON.stringify(o))}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function typeName(t){return{seller:'Seller',buyer:'Buyer',dual:'Dual Agency',cash:'Cash',financed:'Financed'}[t]||t}

function getPhases(p){
  // Use custom phases if they exist, otherwise use defaults for type
  if(p.customPhases) return p.customPhases;
  const key = p.type==='buyer' ? 'buyer' : 'seller';
  return deepClone(DEFAULT_PHASES[key]||DEFAULT_PHASES.seller);
}

function getStats(p){
  const ph=getPhases(p);let tot=0,done=0;
  ph.forEach(s=>s.tasks.forEach(t=>{tot++;if((p.checked||{})[t.id])done++;}));
  return{tot,done,pct:tot?Math.round(done/tot*100):0};
}

function render(){
  const list=document.getElementById('prop-list');
  const active=props.filter(p=>p.status!=='archived');
  const archived=props.filter(p=>p.status==='archived');
  let html='';
  if(!props.length)html='<div style="padding:14px 6px;font-size:12px;color:var(--text3);text-align:center">No properties yet</div>';
  active.forEach(p=>{
    const {pct}=getStats(p);
    html+=`<div class="prop-item${p.id===activeId?' active':''}" onclick="selectProp('${p.id}')">
      <div class="prop-name">${esc(p.address||'Unnamed')}</div>
      <div class="prop-meta">${pct}% · ${typeName(p.type)}${p.closing?' · '+esc(p.closing):''}</div>
      <span class="prop-badge badge-${p.status==='closed'?'closed':p.type}">${p.status==='closed'?'Closed':typeName(p.type)}</span>
    </div>`;
  });
  if(archived.length){
    html+=`<div class="section-label">Archived</div>`;
    archived.forEach(p=>{
      html+=`<div class="prop-item${p.id===activeId?' active':''}" onclick="selectProp('${p.id}')">
        <div class="prop-name" style="color:var(--text3)">${esc(p.address||'Unnamed')}</div>
        <span class="prop-badge badge-archived">Archived</span>
      </div>`;
    });
  }
  list.innerHTML=html;
  if(!activeId) renderDashboard();
  else renderMain();
}

  const closed=props.filter(p=>p.status==='closed');
  const archived=props.filter(p=>p.status==='archived');

  let tilesHtml='';
  if(!props.length){
    tilesHtml=`<div class="dash-empty">
      <div class="dash-empty-icon"><i class="ti ti-home-plus"></i></div>
      <div class="dash-empty-title">No properties yet</div>
      <div class="dash-empty-sub">Add your first property to get started</div>
      <button class="btn btn-primary" onclick="openNewProp()"><i class="ti ti-plus"></i> Add first property</button>
    </div>`;
  } else {
    if(active.length){
      tilesHtml+=`<div class="dash-section-label">Active Transactions</div><div class="dash-tiles">`;
      active.forEach(p=>{
        const {pct,done,tot}=getStats(p);
        const closing=p.dates&&p.dates.closing_date?formatDate(p.dates.closing_date):(p.closing?p.closing:'');
        const daysLeft=closing?daysUntil(p.dates&&p.dates.closing_date?p.dates.closing_date:p.closing):'';
        tilesHtml+=propTile(p,pct,done,tot,closing,daysLeft);
      });
      tilesHtml+=`</div>`;
    }
    if(closed.length){
      tilesHtml+=`<div class="dash-section-label">Closed</div><div class="dash-tiles">`;
      closed.forEach(p=>{
        const {pct,done,tot}=getStats(p);
        tilesHtml+=propTile(p,pct,done,tot,'','');
      });
      tilesHtml+=`</div>`;
    }
  }

  main.innerHTML=`
<div class="dash-header">
  <div class="dash-header-left">
    <div class="dash-greeting">Good ${getTimeOfDay()}</div>
    <div class="dash-stats-row">
      <div class="dash-stat"><span>${active.length}</span> Active</div>
      <div class="dash-stat"><span>${closed.length}</span> Closed</div>
      <div class="dash-stat"><span>${archived.length}</span> Archived</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="openNewProp()"><i class="ti ti-plus"></i> New property</button>
</div>
<div class="dash-content">
  ${tilesHtml}
</div>`;
}

function propTile(p,pct,done,tot,closing,daysLeft){
  const r=42, circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  const gap=circ-dash;
  const statusColor=p.status==='closed'?'var(--text3)':pct===100?'var(--green)':pct>50?'var(--teal)':'var(--blush)';
  const urgent=daysLeft!==''&&daysLeft<=7&&daysLeft>=0;
  return `<div class="prop-tile" onclick="selectProp('${p.id}')">
    <div class="tile-top">
      <div class="tile-progress">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/>
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="${statusColor}" stroke-width="8"
            stroke-dasharray="${dash} ${gap}" stroke-linecap="round"
            transform="rotate(-90 50 50)" style="transition:stroke-dasharray .4s"/>
          <text x="50" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="var(--text)">${pct}%</text>
          <text x="50" y="62" text-anchor="middle" font-size="9" fill="var(--text3)">${done}/${tot}</text>
        </svg>
      </div>
      <div class="tile-info">
        <div class="tile-address">${esc(p.address||'Unnamed')}</div>
        ${p.client?`<div class="tile-client"><i class="ti ti-user" style="font-size:11px"></i> ${esc(p.client)}</div>`:''}
        <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
          <span class="prop-badge badge-${p.status==='closed'?'closed':p.type}">${p.status==='closed'?'Closed':typeName(p.type)}</span>
        </div>
        ${closing?`<div class="tile-closing ${urgent?'urgent':''}"><i class="ti ti-calendar"></i> ${urgent?'<strong>':''}${closing}${daysLeft!==''?' ('+daysLeft+'d)':''}${urgent?'</strong>':''}</div>`:''}
      </div>
    </div>
  </div>`;
}

function daysUntil(dateStr){
  if(!dateStr)return'';
  try{
    const d=new Date(dateStr+'T12:00:00');
    const now=new Date();
    const diff=Math.ceil((d-now)/(1000*60*60*24));
    return diff;
  }catch(e){return'';}
}

function getTimeOfDay(){
  const h=new Date().getHours();
  if(h<12)return'morning';
  if(h<17)return'afternoon';
  return'evening';
}

function selectProp(id){activeId=id;activeTab='detail';closeSidebar();render();}
function goHome(){activeId=null;closeSidebar();render();}

// ── DATES PANEL ──────────────────────────────────────────────────
function renderDatesPanel(p){
  const dates=p.dates||{};
  const toggle=datesOpen?'open':'';
  // Merge default fields with any custom ones saved on the property
  const customFields=p.customDateFields||[];
  const hiddenFields=p.hiddenDateFields||[];
  const defaultFields=DATE_FIELDS.filter(f=>!hiddenFields.includes(f.key));
  const allFields=[...defaultFields,...customFields];
  let html=`<div class="dates-panel">
    <div class="dates-header" onclick="toggleDates()">
      <i class="ti ti-calendar" style="color:var(--teal-dark);font-size:16px"></i>
      <span class="dates-header-title">Important dates & deadlines</span>
      <i class="ti ti-chevron-down phase-toggle ${toggle}" style="color:var(--teal-dark)"></i>
    </div>`;
  if(datesOpen){
    html+=`<div class="dates-grid">`;
    allFields.forEach(f=>{
      const val=dates[f.key]||'';
      const display=val?formatDate(val):'Not set';
      const isEmpty=!val;
      const isCustom=!!f.custom;
      html+=`<div class="date-item">
        <div class="date-icon ${f.style||''}"><i class="ti ${f.icon||'ti-calendar'}"></i></div>
        <div class="date-body">
          <div class="date-label">${esc(f.label)}</div>
          <div class="date-val${isEmpty?' empty':''}">${esc(display)}</div>
        </div>
        <button class="date-edit-btn" onclick="editDate('${p.id}','${esc(f.key)}','${esc(f.label)}','${esc(val)}')" title="Edit date"><i class="ti ti-pencil"></i></button>
        <button class="date-edit-btn" onclick="deleteDateField('${p.id}','${esc(f.key)}')" title="Remove this field" style="color:#a32d2d"><i class="ti ti-x"></i></button>
      </div>`;
    });
    html+=`</div>
    <div class="add-date-row">
      <button class="btn btn-sm" onclick="addDateField('${p.id}')"><i class="ti ti-plus"></i> Add date field</button>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function addDateField(pid){
  showModal(`<div class="modal" onclick="event.stopPropagation()" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-icon"><i class="ti ti-calendar-plus"></i></div>
      <span class="modal-title">Add date field</span>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Label *</label><input class="form-input" id="ndf-label" placeholder="e.g. HOA Approval Deadline"></div>
      <div class="form-row"><label class="form-label">Date (optional)</label><input class="form-input" type="date" id="ndf-val"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" onclick="saveNewDateField('${pid}')"><i class="ti ti-plus"></i> Add</button>
    </div>
  </div>`);
  setTimeout(()=>{const el=document.getElementById('ndf-label');if(el)el.focus();},50);
}

function saveNewDateField(pid){
  const label=(document.getElementById('ndf-label').value||'').trim();
  if(!label){alert('Please enter a label.');return;}
  const val=document.getElementById('ndf-val').value||'';
  const p=props.find(x=>x.id===pid);if(!p)return;
  if(!p.customDateFields)p.customDateFields=[];
  const key='custom_date_'+Date.now();
  p.customDateFields.push({key,label,icon:'ti-calendar',style:'',custom:true});
  if(!p.dates)p.dates={};
  if(val)p.dates[key]=val;
  save();closeModal();renderTab(p);
}

function deleteDateField(pid,key){
  const p=props.find(x=>x.id===pid);if(!p)return;
  // If it's a custom field, remove it entirely
  if(p.customDateFields&&p.customDateFields.find(f=>f.key===key)){
    p.customDateFields=p.customDateFields.filter(f=>f.key!==key);
  } else {
    // If it's a default field, just hide it for this property
    if(!p.hiddenDateFields)p.hiddenDateFields=[];
    if(!p.hiddenDateFields.includes(key))p.hiddenDateFields.push(key);
  }
  if(p.dates)delete p.dates[key];
  save();renderTab(p);
}

function formatDate(d){
  if(!d)return'';
  try{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  catch(e){return d;}
}

function toggleDates(){datesOpen=!datesOpen;const p=props.find(x=>x.id===activeId);if(p)renderTab(p);}

function editDate(pid,key,label,current){
  showModal(`<div class="modal" onclick="event.stopPropagation()" style="max-width:340px">
    <div class="modal-header">
      <div class="modal-icon"><i class="ti ti-calendar"></i></div>
      <span class="modal-title">${esc(label)}</span>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="date-val" value="${esc(current)}">
      </div>
    </div>
    <div class="modal-footer">
      ${current?`<button class="btn btn-sm btn-danger" onclick="saveDate('${pid}','${key}','')">Clear</button>`:''}
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" onclick="saveDate('${pid}','${key}',document.getElementById('date-val').value)">Save</button>

function saveDate(pid,key,val){
  const p=props.find(x=>x.id===pid);if(!p)return;
  if(!p.dates)p.dates={};

// ── DETAIL TAB ───────────────────────────────────────────────────
function renderDetail(tc,p){
  const phases=getPhases(p);
  let html=renderDatesPanel(p);
  phases.forEach(ph=>{
    let phDone=0;ph.tasks.forEach(t=>{if((p.checked||{})[t.id])phDone++;});
    const isOpen=expanded[ph.id]!==false;
    html+=`<div class="phase-section">
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <i class="ti ti-${phDone===ph.tasks.length?'circle-check':'circle'}" style="color:${phDone===ph.tasks.length?'var(--green)':'var(--blush-dark)'}"></i>
        <span class="phase-title">${esc(ph.name)}</span>
        <span class="phase-count">${phDone}/${ph.tasks.length}</span>
        <button class="phase-add-btn" onclick="event.stopPropagation();addTask('${p.id}','${ph.id}')"><i class="ti ti-plus" style="font-size:10px"></i> Add task</button>
        <i class="ti ti-chevron-down phase-toggle${isOpen?' open':''}"></i>
      </div>
      ${isOpen?`<div class="task-list">${ph.tasks.map(t=>taskHTML(t,p,ph.id)).join('')}</div>`:''}
    </div>`;
  });
  tc.innerHTML=html;
}

function taskHTML(t,p,phId){
  const chk=!!(p.checked||{})[t.id];
  const whoClass=t.who==='TC'?'meta-tc':t.who==='Agent'?'meta-agent':'meta-both';
  const whoLabel=t.who==='Both'?'Agent + TC':t.who==='Agent+Seller'?'Agent + Seller':t.who;
  // Support per-task overrides stored in p.taskMeta
  const meta=(p.taskMeta||{})[t.id]||{};
  const showDotloop=meta.dotloop!==undefined?meta.dotloop:t.dotloop;
  const showEmail=meta.email!==undefined?meta.email:t.email;
  return `<div class="task-item${chk?' done':''}">
    <div class="task-check${chk?' checked':''}" onclick="toggleTask('${p.id}','${t.id}')" role="checkbox" aria-checked="${chk}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')toggleTask('${p.id}','${t.id}')">
      ${chk?'<i class="ti ti-check" style="font-size:11px;color:#fff"></i>':''}
    </div>
    <div class="task-body">
      <div class="task-name">${esc(t.name)}</div>
      ${t.desc?`<div class="task-desc">${esc(t.desc)}</div>`:''}
      <div class="task-meta">
        <span class="meta-tag ${whoClass}" onclick="cycleWho('${p.id}','${t.id}','${phId}')" title="Click to change responsibility"><i class="ti ti-user" style="font-size:11px"></i> ${esc(whoLabel)}</span>
        <span class="meta-tag meta-dotloop${showDotloop?'':' meta-off'}" onclick="toggleMeta('${p.id}','${t.id}','dotloop')" title="Click to toggle Dotloop"><i class="ti ti-upload" style="font-size:11px"></i> Dotloop</span>
        ${t.emailKey?`<button class="email-btn${showEmail?'':' off'}" onclick="${showEmail?`openEmail('${t.emailKey}','${p.id}')`:`toggleMeta('${p.id}','${t.id}','email')`}" title="${showEmail?'Open email draft':'Click to enable email'}"><i class="ti ti-mail" style="font-size:11px"></i> ${showEmail?'Draft email':'Email off'}</button>`:''}
      </div>
    </div>
    <button class="task-del-btn" onclick="deleteTask('${p.id}','${phId}','${t.id}')" title="Delete task"><i class="ti ti-x"></i></button>
  </div>`;
}

function togglePhase(id){expanded[id]=expanded[id]===false;const p=props.find(x=>x.id===activeId);if(p)renderDetail(document.getElementById('tab-content'),p);}

function toggleTask(pid,tid){
  const p=props.find(x=>x.id===pid);if(!p)return;
  if(!p.checked)p.checked={};
  p.checked[tid]=!p.checked[tid];
  save();render();
}

function cycleWho(pid,tid,phId){
  const p=props.find(x=>x.id===pid);if(!p)return;
  ensureCustomPhases(p);
  const ph=p.customPhases.find(x=>x.id===phId);if(!ph)return;
  const t=ph.tasks.find(x=>x.id===tid);if(!t)return;
  const cycle=['TC','Agent','Both'];
  const cur=t.who;
  t.who=cycle[(cycle.indexOf(cur)+1)%cycle.length]||'TC';
  save();renderDetail(document.getElementById('tab-content'),p);
}

function toggleMeta(pid,tid,field){
  const p=props.find(x=>x.id===pid);if(!p)return;
  if(!p.taskMeta)p.taskMeta={};
  if(!p.taskMeta[tid])p.taskMeta[tid]={};
  // Get current effective value
  ensureCustomPhases(p);
  let ph,t;
  for(const phase of p.customPhases){const found=phase.tasks.find(x=>x.id===tid);if(found){t=found;ph=phase;break;}}
  if(!t)return;
  const cur=p.taskMeta[tid][field]!==undefined?p.taskMeta[tid][field]:t[field];
  p.taskMeta[tid][field]=!cur;
  save();renderDetail(document.getElementById('tab-content'),p);
}

function ensureCustomPhases(p){
  if(!p.customPhases){
    p.customPhases=deepClone(DEFAULT_PHASES[p.type==='buyer'?'buyer':'seller']||DEFAULT_PHASES.seller);
  }
}

function addTask(pid,phId){
  showModal(`<div class="modal" onclick="event.stopPropagation()" style="max-width:460px">
    <div class="modal-header">
      <div class="modal-icon"><i class="ti ti-plus"></i></div>
      <span class="modal-title">Add task</span>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Task name *</label><input class="form-input" id="nt-name" placeholder="e.g. Send HOA documents"></div>
      <div class="form-row"><label class="form-label">Description</label><textarea class="form-input" id="nt-desc" placeholder="Optional notes or instructions"></textarea></div>
      <div class="form-row">
        <label class="form-label">Responsible party</label>
        <div class="toggle-row">
          <button class="toggle-chip on" id="nt-who-tc" onclick="setWhoChip('TC')">TC</button>
          <button class="toggle-chip" id="nt-who-agent" onclick="setWhoChip('Agent')">Agent</button>
          <button class="toggle-chip" id="nt-who-both" onclick="setWhoChip('Both')">Both</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Tags</label>
        <div class="toggle-row">
          <button class="toggle-chip" id="nt-dotloop" onclick="this.classList.toggle('on')">Dotloop</button>
          <button class="toggle-chip" id="nt-email" onclick="this.classList.toggle('on')">Email needed</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" onclick="saveNewTask('${pid}','${phId}')"><i class="ti ti-plus"></i> Add task</button>
    </div>
  </div>`);
  setTimeout(()=>{const el=document.getElementById('nt-name');if(el)el.focus();},50);
}

let _newTaskWho='TC';
function setWhoChip(v){
  _newTaskWho=v;
  ['TC','Agent','Both'].forEach(w=>{
    const el=document.getElementById('nt-who-'+w.toLowerCase());
    if(el)el.classList.toggle('on',w===v);
  });
}

function saveNewTask(pid,phId){
  const name=document.getElementById('nt-name').value.trim();
  if(!name){alert('Please enter a task name.');return;}
  const desc=document.getElementById('nt-desc').value.trim();
  const dotloop=document.getElementById('nt-dotloop').classList.contains('on');
  const email=document.getElementById('nt-email').classList.contains('on');
  const p=props.find(x=>x.id===pid);if(!p)return;
  ensureCustomPhases(p);
  const ph=p.customPhases.find(x=>x.id===phId);if(!ph)return;
  const tid='custom_'+Date.now();
  ph.tasks.push({id:tid,name,desc,who:_newTaskWho,email:email,emailKey:null,dotloop});
  _newTaskWho='TC';
  save();closeModal();renderDetail(document.getElementById('tab-content'),p);
}

function deleteTask(pid,phId,tid){
  const p=props.find(x=>x.id===pid);if(!p)return;
  ensureCustomPhases(p);
  const ph=p.customPhases.find(x=>x.id===phId);if(!ph)return;
  ph.tasks=ph.tasks.filter(t=>t.id!==tid);
  if(p.checked)delete p.checked[tid];
  save();renderDetail(document.getElementById('tab-content'),p);
}

// ── ONE SHEET ────────────────────────────────────────────────────
function renderOneSheet(tc,p){
  const phases=getPhases(p);
  let html='<div class="onesheet-grid">';
  phases.forEach(ph=>{
    html+=`<div class="onesheet-phase"><div class="onesheet-ph-title">${esc(ph.name)}</div>`;
    ph.tasks.forEach(t=>{
      const chk=!!(p.checked||{})[t.id];
      html+=`<div class="onesheet-item"><input type="checkbox" ${chk?'checked':''} onchange="toggleTask('${p.id}','${t.id}')" aria-label="${esc(t.name)}"><span class="onesheet-label${chk?' done':''}">${esc(t.name)}</span></div>`;
    });
    html+='</div>';
  });
  tc.innerHTML=html+'</div>';
}

// ── EMAIL ────────────────────────────────────────────────────────
function openEmail(key,pid){
  const tmpl=EMAILS[key];if(!tmpl)return;
  const p=props.find(x=>x.id===pid);
  const addr=p?p.address:'[Property Address]';
  const body=tmpl.body.replace(/\[Address\]/g,addr).replace(/\[Property Address\]/g,addr);
  const subj=tmpl.subject.replace(/\[Address\]/g,addr).replace(/\[Property Address\]/g,addr);
  showModal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-icon"><i class="ti ti-mail"></i></div>
      <span class="modal-title">Email draft</span>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="email-field"><div class="email-label">To</div><div class="email-val">${esc(tmpl.to)}</div></div>
      <div class="email-field"><div class="email-label">From</div><div class="email-val">${esc(tmpl.from)}</div></div>
      <div class="email-field"><div class="email-label">Subject</div><div class="email-val" style="font-weight:700">${esc(subj)}</div></div>
      <div class="email-field">
        <div class="email-label">Body <span style="font-weight:400;text-transform:none;font-size:11px">(tap to edit)</span></div>
        <div class="email-body-area" contenteditable="true" id="email-body-txt">${esc(body)}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="copyEmail()"><i class="ti ti-copy"></i> Copy body</button>
      <button class="btn btn-sm btn-primary" onclick="closeModal()">Done</button>
    </div>
  </div>`);
}

function copyEmail(){
  const el=document.getElementById('email-body-txt');if(!el)return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    const b=document.querySelector('.modal-footer .btn');
    if(b){const o=b.innerHTML;b.innerHTML='<i class="ti ti-check"></i> Copied!';setTimeout(()=>b.innerHTML=o,2000);}
  }).catch(()=>{});
}

// ── CONFIRM / ACTIONS ────────────────────────────────────────────
function confirmAction(action,id){
  const p=props.find(x=>x.id===id);if(!p)return;
  const cfg={
    close:{title:'Mark as closed',msg:`Mark <strong>${esc(p.address)}</strong> as closed?`,btn:'Mark closed',ic:'green',icon:'ti-check'},
    archive:{title:'Archive property',msg:`Archive <strong>${esc(p.address)}</strong>? It will move to the archived section.`,btn:'Archive',ic:'',icon:'ti-archive'},
    delete:{title:'Delete property',msg:`Permanently delete <strong>${esc(p.address)}</strong> and all data? This cannot be undone.`,btn:'Delete',ic:'red',icon:'ti-trash'},
  };
  const m=cfg[action];
  showModal(`<div class="modal" onclick="event.stopPropagation()" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-icon ${m.ic}"><i class="ti ${m.icon}"></i></div>
      <span class="modal-title">${m.title}</span>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body"><p class="confirm-msg">${m.msg}</p></div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm ${action==='delete'?'btn-danger':action==='close'?'btn-success':'btn-warn'}" onclick="doAction('${action}','${id}')">${m.btn}</button>
    </div>
  </div>`);
}

function doAction(action,id){
  closeModal();
  if(action==='close'){const p=props.find(x=>x.id===id);if(p){p.status='closed';save();render();}}
  else if(action==='archive'){const p=props.find(x=>x.id===id);if(p){p.status='archived';save();render();}}
  else if(action==='delete'){props=props.filter(x=>x.id!==id);if(activeId===id)activeId=null;save();render();}
}

// ── PROPERTY FORM ────────────────────────────────────────────────
function propForm(p){
  const isEdit=!!p;
  showModal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-icon"><i class="ti ti-home-plus"></i></div>
      <span class="modal-title">${isEdit?'Edit property':'Add property'}</span>
      <button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Property address *</label><input class="form-input" id="f-addr" value="${esc(p?p.address:'')}" placeholder="123 Ocean Dr, Key West, FL"></div>
      <div class="form-row"><label class="form-label">Transaction type</label>
        <select class="form-input" id="f-type">
          <option value="seller"${(!p||p.type==='seller')?' selected':''}>Seller / Listing</option>
          <option value="buyer"${p&&p.type==='buyer'?' selected':''}>Buyer</option>
          <option value="dual"${p&&p.type==='dual'?' selected':''}>Dual Agency</option>
          <option value="cash"${p&&p.type==='cash'?' selected':''}>Cash</option>
          <option value="financed"${p&&p.type==='financed'?' selected':''}>Financed</option>
        </select>
      </div>
      <div class="form-row"><label class="form-label">Client name</label><input class="form-input" id="f-client" value="${esc(p?p.client:'')}" placeholder="Smith Family"></div>
      <div class="form-row"><label class="form-label">Closing date</label><input class="form-input" type="date" id="f-closing" value="${p&&p.closing?p.closing:''}"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-primary" onclick="saveProp(${isEdit?`'${p.id}'`:'null'})">${isEdit?'Save changes':'Add property'}</button>
    </div>
  </div>`);
  setTimeout(()=>{const el=document.getElementById('f-addr');if(el)el.focus();},80);
}

function openNewProp(){propForm(null);}
function editProp(id){const p=props.find(x=>x.id===id);if(p)propForm(p);}

function saveProp(id){
  const addr=(document.getElementById('f-addr').value||'').trim();
  if(!addr){alert('Please enter a property address.');return;}
  const type=document.getElementById('f-type').value;
  const client=(document.getElementById('f-client').value||'').trim();
  const closing=document.getElementById('f-closing').value;
  if(id&&id!=='null'){
    const p=props.find(x=>x.id===id);
    if(p){
      const typeChanged=p.type!==type;
      p.address=addr;p.client=client;p.closing=closing;
      if(typeChanged){p.type=type;p.customPhases=null;}// reset checklist on type change
      else p.type=type;
    }
  }else{
    const nid='p'+Date.now();
    props.unshift({id:nid,address:addr,type,client,closing,status:'active',checked:{},dates:{},taskMeta:{}});
    activeId=props[0].id;
  }
  save();closeModal();render();
}

// ── MODAL HELPERS ────────────────────────────────────────────────
function showModal(html){const ov=document.getElementById('modal-overlay');ov.innerHTML=html;ov.style.display='flex';}
function closeModal(){const ov=document.getElementById('modal-overlay');ov.style.display='none';ov.innerHTML='';}
function handleOverlayClick(e){if(e.target===e.currentTarget)closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});


</script>
</body>
</html>
